services:
  - type: pserv
    name: openclaw-team-os-gateway
    runtime: node
    rootDir: .
    buildCommand: ./scripts/render-gateway-build.sh
    startCommand: ./scripts/render-gateway-start.sh
    healthCheckPath: /health
    plan: starter
    autoDeploy: true
    disk:
      name: openclaw-gateway-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: "10000"
      - key: OPENCLAW_GATEWAY_PORT
        value: "10000"
      - key: OPENCLAW_STATE_DIR
        value: /var/data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /var/data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: openclaw-team-os-api
    runtime: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm build:api-deploy
    startCommand: ./scripts/render-api-start.sh
    healthCheckPath: /health
    plan: starter
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: openclaw-team-os-db
          property: connectionString
      - key: OPENCLAW_RUNTIME_MODE
        value: mock
      - key: OPENCLAW_GATEWAY_URL
        value: ""
      - key: OPENCLAW_GATEWAY_HOSTPORT
        fromService:
          name: openclaw-team-os-gateway
          type: pserv
          property: hostport
      - key: OPENCLAW_GATEWAY_TOKEN
        fromService:
          name: openclaw-team-os-gateway
          type: pserv
          envVarKey: OPENCLAW_GATEWAY_TOKEN
      - key: OPENCLAW_GATEWAY_SESSION_KEY
        value: main
      - key: OPENCLAW_LLM_TASK_PROVIDER
        value: openai
      - key: OPENCLAW_LLM_TASK_MODEL
        value: gpt-5.4
      - key: OPENCLAW_LLM_TASK_THINKING
        value: low
      - key: OPENCLAW_LLM_TASK_MAX_TOKENS
        value: "1200"
      - key: SHORTAPI_KEY
        sync: false
      - key: SHORTAPI_BASE_URL
        value: https://api.shortapi.ai
      - key: SHORTAPI_VIDEO_MODEL
        value: vidu/vidu-q3/text-to-video
      - key: SHORTAPI_VIDEO_MODE
        value: pro
      - key: ARK_API_KEY
        sync: false
      - key: MODELARK_BASE_URL
        value: https://ark.ap-southeast.bytepluses.com/api/v3
      - key: MODELARK_VIDEO_MODEL
        value: seedance-1-5-pro-251215
      - key: MODELARK_VIDEO_RESOLUTION
        value: 720p

databases:
  - name: openclaw-team-os-db
    plan: starter
