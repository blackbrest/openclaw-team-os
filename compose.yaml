services:
  postgres:
    image: postgres:16
    container_name: openclaw-team-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: openclaw_team_os
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: openclaw
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - openclaw_team_os_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw -d openclaw_team_os"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  openclaw_team_os_postgres_data:
